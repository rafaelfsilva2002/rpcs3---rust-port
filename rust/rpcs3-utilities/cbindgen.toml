# cbindgen config — gera rpcs3-utilities/include/rpcs3_utilities.h
# Rodar manualmente: `cbindgen --config cbindgen.toml --crate rpcs3-utilities --output include/rpcs3_utilities.h`

language = "C"
header = "/* Generated by cbindgen — do not edit. See rust/rpcs3-utilities. */"
include_guard = "RPCS3_UTILITIES_H"
pragma_once = true
autogen_warning = "/* This header is generated; run `cbindgen` if you edit lib.rs. */"
no_includes = false
sys_includes = ["stddef.h", "stdint.h"]

[export]
prefix = "rpcs3_"

[defines]
"target_os = windows" = "RPCS3_UTIL_WINDOWS"
