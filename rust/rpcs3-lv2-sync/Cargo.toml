[package]
name = "rpcs3-lv2-sync"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Rust port of rpcs3/Emu/Cell/lv2/sys_mutex.cpp + sys_semaphore.cpp — mutex and semaphore syscalls."

[lib]
name = "rpcs3_lv2_sync"
crate-type = ["staticlib", "rlib"]

[dependencies]
rpcs3-emu-types = { path = "../rpcs3-emu-types" }
rpcs3-lv2-lwmutex = { path = "../rpcs3-lv2-lwmutex" }
rpcs3-lv2-cond = { path = "../rpcs3-lv2-cond" }

[lints]
workspace = true
