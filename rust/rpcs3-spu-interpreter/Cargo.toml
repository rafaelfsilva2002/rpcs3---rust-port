[package]
name = "rpcs3-spu-interpreter"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "SPU ISA interpreter — iteration 1 subset (immediate + register ALU, branches, local-store loads/stores, stop/halt). Mirror of rpcs3-ppu-interpreter."

[lib]
name = "rpcs3_spu_interpreter"
crate-type = ["staticlib", "rlib"]

[dependencies]
rpcs3-emu-types = { path = "../rpcs3-emu-types" }
rpcs3-spu-thread = { path = "../rpcs3-spu-thread" }

[lints]
workspace = true
