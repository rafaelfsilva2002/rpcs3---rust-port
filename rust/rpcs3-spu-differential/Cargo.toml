[package]
name = "rpcs3-spu-differential"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Backend-agnostic SPU execution + differential comparison harness. Implements `SpuExecutor` for the interpreter today; future SPU recompiler implements the same trait and is validated against the interpreter automatically."

[lib]
name = "rpcs3_spu_differential"
crate-type = ["staticlib", "rlib"]

[dependencies]
rpcs3-spu-thread = { path = "../rpcs3-spu-thread" }
rpcs3-spu-interpreter = { path = "../rpcs3-spu-interpreter" }

[lints]
workspace = true
