# R6.0c — cbindgen config for rpcs3-spu-ffi.
#
# Generates `include/rpcs3_spu_ffi.h`, the C header that the RPCS3
# C++ side will `#include` in R6.1+. The header MUST be C-stable:
# only types annotated `#[repr(C)]` are emitted; opaque types
# (RustSpu) become forward-declared structs; nothing about the
# Rust internals (std::, Box, etc.) leaks.
#
# Regenerate via:
#   cd rust/rpcs3-spu-ffi
#   cbindgen --config cbindgen.toml --crate rpcs3-spu-ffi --output include/rpcs3_spu_ffi.h
#
# Or via the helper script that the workspace will land in R6.1.

language = "C"
header = "/* rpcs3_spu_ffi.h — auto-generated by cbindgen, do not edit by hand. */"
include_guard = "RPCS3_SPU_FFI_H"
pragma_once = true
no_includes = false
sys_includes = ["stdint.h", "stddef.h"]

# Use C-style enum names (no namespacing prefix beyond what's
# already in the Rust enum identifier).
style = "type"
cpp_compat = true

# Documentation in the header comes from the Rust /// comments.
documentation = true
documentation_style = "doxy"

# Sort items alphabetically within each kind. Stable diffs across
# regenerations.
[export]
item_types = ["enums", "structs", "opaque", "typedefs", "functions"]
[export.rename]
# Rename the enum values to a flat C-style namespace.
"RustSpuOutcome" = "rust_spu_outcome_t"
"RustSpu" = "rust_spu_t"

[fn]
# C functions get the rust function name verbatim (it already uses
# `rust_spu_*` prefix). cbindgen will pick up the `#[no_mangle]
# extern "C"` attributes.

[enum]
# Tagged enums are NOT emitted as C tagged unions; only flat C
# enums are allowed (we have no Rust enum with payload in our
# C-ABI surface — `RustSpuOutcome` is a plain C-flat enum).
#
# `prefix_with_name = true` is REQUIRED so the variants get a
# `RustSpuOutcome_` prefix and don't collide with Windows.h macros
# like `ERROR` / `STOP` / `CONTINUE` when included in the RPCS3
# build. Variants land as e.g. `RustSpuOutcome_StallRead`.
prefix_with_name = true

[parse]
parse_deps = false
# Limit to our own crate. Don't traverse transitive dependencies
# (rpcs3-spu-thread, rpcs3-spu-interpreter, etc.) — they have no
# `#[no_mangle] extern "C"` symbols to expose anyway.
