[package]
name = "rpcs3-spu-recompiler"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "SPU recompiler: a Cranelift-backed JIT (RecompilerExecutor) compiling SPU basic blocks to native host code, with per-function interpreter fallback for unsupported opcodes / channel stalls. Byte-identical to the interpreter across the SPU replay oracles."

[lib]
name = "rpcs3_spu_recompiler"
crate-type = ["staticlib", "rlib"]

[dependencies]
rpcs3-spu-decoder = { path = "../rpcs3-spu-decoder" }
rpcs3-spu-differential = { path = "../rpcs3-spu-differential" }
# R5.2 needs the SpuChannels type directly so the JIT can hold a
# `*mut SpuChannels` in JitState and call `extern "C"` helpers that
# operate on the real channel state.
rpcs3-spu-thread = { path = "../rpcs3-spu-thread" }

# Cranelift JIT — pure-Rust assembler + register allocator.
# Chosen over LLVM/inkwell per SPU_RECOMPILER_PLAN.md D1: easier
# Windows MSVC integration, no external toolchain.
cranelift = "0.118"
cranelift-jit = "0.118"
cranelift-module = "0.118"
cranelift-native = "0.118"
target-lexicon = "0.13"

[lints]
workspace = true

[dev-dependencies]
# Lever #0 of the optimization roadmap (docs/PORT_STATUS_AND_ROADMAP.md §4):
# a measurement harness so interpreter-vs-JIT speed can be tracked.
criterion = "0.5"

[[bench]]
name = "spu_executors"
harness = false
